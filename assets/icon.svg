<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Favicon / icon variant — prism only, no wordmark -->
  <defs>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="iconGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#0f0f1a"/>

  <!-- Prism body -->
  <polygon
    points="32,8 6,56 58,56"
    fill="#0f0f1a"
    stroke="url(#strokeGrad)"
    stroke-width="2"
    stroke-linejoin="round"
  />

  <!-- Inner edge -->
  <polygon
    points="32,14 10,52 54,52"
    fill="none"
    stroke="#ffffff"
    stroke-width="0.4"
    stroke-opacity="0.07"
  />

  <!-- Incoming ray -->
  <line x1="4" y1="22" x2="20" y2="34"
    stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"
    stroke-opacity="0.85" filter="url(#iconGlow)"/>

  <!-- Refracted rays -->
  <line x1="42" y1="36" x2="60" y2="24" stroke="#818cf8" stroke-width="1.8" stroke-linecap="round" filter="url(#iconGlow)"/>
  <line x1="42" y1="38" x2="60" y2="31" stroke="#a78bfa" stroke-width="1.8" stroke-linecap="round" filter="url(#iconGlow)"/>
  <line x1="42" y1="40" x2="60" y2="38" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round" filter="url(#iconGlow)"/>
  <line x1="42" y1="42" x2="60" y2="45" stroke="#2dd4bf" stroke-width="1.8" stroke-linecap="round" filter="url(#iconGlow)"/>
  <line x1="42" y1="44" x2="60" y2="52" stroke="#34d399" stroke-width="1.8" stroke-linecap="round" filter="url(#iconGlow)"/>
</svg>
